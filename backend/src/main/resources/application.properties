spring.application.name=fashora-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fashora_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:fashora_user}
spring.datasource.password=${DB_PASS:fashora_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:FashoraSecretKey2025VeryLongAndSecureSigningKeyForJWT}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:80,http://frontend:80}

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
logging.level.com.fashora=INFO
logging.level.org.springframework.security=WARN

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
